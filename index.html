<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AKROSPORT | Performance Lab</title>
    <meta name="description" content="AKROSPORT - Elite Performance Lab. Entrenamiento de alto rendimiento en Chile." />
    <meta name="theme-color" content="#c8ff00" />

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer-policy" content="strict-origin-when-cross-origin" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AKROSPORT" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23c8ff00'/%3E%3Ctext y='.9em' x='.1em' font-size='70' font-weight='bold' fill='%23050505'%3EA%3C/text%3E%3C/svg%3E" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --lime: #c8ff00;
        --void: #0a0a0a;
        --surface: #141414;
        --text: #ffffff;
        --text-dim: #666666;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--void);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 500px;
      }
      .logo {
        width: 80px;
        height: 80px;
        background: var(--lime);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        transform: rotate(12deg);
      }
      .logo span {
        font-size: 2.5rem;
        font-weight: 900;
        color: var(--void);
        transform: rotate(-12deg);
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: -0.05em;
        margin-bottom: 0.5rem;
      }
      h1 span { color: var(--lime); }
      .tagline {
        font-size: 0.75rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.3em;
        margin-bottom: 3rem;
      }
      .status {
        background: var(--surface);
        border: 1px solid #333;
        border-radius: 1rem;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        background: var(--lime);
        border-radius: 50%;
        display: inline-block;
        margin-right: 0.5rem;
        box-shadow: 0 0 10px var(--lime);
      }
      .status-text {
        font-size: 0.875rem;
        color: var(--text-dim);
      }
      .links {
        display: flex;
        gap: 1rem;
        justify-content: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.875rem 1.5rem;
        border-radius: 0.75rem;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--lime);
        color: var(--void);
      }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-secondary {
        background: transparent;
        border: 1px solid #333;
        color: var(--text);
      }
      .btn-secondary:hover { border-color: var(--lime); }
      .contact {
        margin-top: 2rem;
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      .contact a {
        color: var(--lime);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <span>A</span>
      </div>
      <h1>AKRO<span>SPORT</span></h1>
      <p class="tagline">Performance Lab</p>

      <div class="status">
        <span class="status-dot"></span>
        <span class="status-text">Proximamente: App de reservas</span>
      </div>

      <div class="links">
        <a href="https://wa.me/56956802641" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
          WhatsApp
        </a>
        <a href="https://instagram.com/akrosport_" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">
          Instagram
        </a>
      </div>

      <p class="contact">
        <a href="mailto:contacto@akrosport.cl">contacto@akrosport.cl</a>
      </p>
    </div>
  </body>
</html>
